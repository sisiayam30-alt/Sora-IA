<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <title>AI Real Technical Analyzer</title>
    <style>
        body { background: #0f111a; color: white; text-align: center; font-family: sans-serif; }
        .buy-style { color: #00ff66; font-size: 30px; font-weight: bold; }
        .sell-style { color: #ff3333; font-size: 30px; font-weight: bold; }
        .nosignal-style { color: #8e9aa8; }
    </style>
</head>
<body>
    <h1>📊 POCKET OPTION ANALYSER</h1>
    
    <select id="market">
        <option value="EUR/USD">EUR/USD</option>
        <option value="GBP/USD">GBP/USD</option>
        <option value="USD/JPY">USD/JPY</option>
        <option value="GOLD">GOLD</option>
    </select>

    <select id="tf">
        <option value="1m">1 Minitra</option>
        <option value="5m">5 Minitra</option>
    </select>

    <button onclick="analyze()">START ANALYSE</button>

    <div id="signal" style="margin-top: 20px;"></div>
    <div id="details"></div>

    <script>
    function analyze() {
        const m = document.getElementById("market").value;
        const tf = document.getElementById("tf").value;
        fetch(`/api/analyze?market=${m}&tf=${tf}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("signal").innerHTML = data.signal;
                document.getElementById("signal").className = data.style;
                document.getElementById("details").innerHTML = `RSI: ${data.rsi}`;
            });
    }
    </script>
</body>
</html>
