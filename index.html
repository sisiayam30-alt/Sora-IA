<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POCKET OPTION BOT</title>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c1f2e; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .buy-style { color: #00ff66; font-size: 24px; font-weight: bold; }
        .sell-style { color: #ff3333; font-size: 24px; font-weight: bold; }
        .neutral-style { color: #8e9aa8; }
        button { background: linear-gradient(to right, #6a11cb, #2575fc); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📊 POCKET OPTION PRO BOT</h1>
    <select id="market">
        <option value="EUR/USD">EUR/USD (Real)</option>
        <option value="GBP/USD">GBP/USD (Real)</option>
        <option value="GOLD">GOLD (XAU/USD)</option>
    </select>
    
    <div class="card">
        <button onclick="startAnalysis()">START REAL ANALYSE 🔍</button>
        <div id="result" style="margin-top: 20px;"></div>
        <div id="rsi-val"></div>
    </div>

    <script>
    function startAnalysis() {
        const m = document.getElementById("market").value;
        document.getElementById("result").innerHTML = "⏳ Analyse en cours...";
        fetch(`/api/analyze?market=${m}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerHTML = data.signal;
                document.getElementById("result").className = data.style;
                document.getElementById("rsi-val").innerHTML = `RSI: ${data.rsi}`;
            });
    }
    </script>
</body>
</html>
