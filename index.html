<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sora-IA Real Forex Analyzer</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #161925;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #23283d;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            color: #4ef2d2;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #202436;
            border: 1px solid #2d334d;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:focus {
            border-color: #4ef2d2;
        }

        /* Ny faritra misy an'ilay tabilao mihetsika mivantana */
        .chart-container {
            width: 100%;
            height: 220px;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d334d;
            background: #131722;
        }

        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .result-box {
            margin-top: 20px;
            background: #1e2235;
            border-radius: 12px;
            padding: 20px;
            border: 1px dashed #2d334d;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status {
            font-size: 14px;
            color: #a0a0a0;
            font-style: italic;
            margin-bottom: 8px;
        }

        .signal {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .buy-style {
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .sell-style {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .nosignal-style {
            color: #8e9aa8;
        }

        .details {
            margin-top: 10px;
            font-size: 13px;
            color: #ffffff;
            line-height: 1.6;
            background: #252a3d;
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            text-align: left;
        }
        
        .details b {
            color: #4ef2d2;
        }

        .accuracy-badge {
            background: rgba(78, 242, 210, 0.1);
            color: #4ef2d2;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 FOREX AI REAL ANALYSER</h1>

        <div class="form-group">
            <label for="market">Safidio ny Marche (Real Forex):</label>
            <select id="market" onchange="changeLiveChart()">
                <option value="FX:EURUSD">EUR/USD (Real)</option>
                <option value="FX:GBPUSD">GBP/USD (Real)</option>
                <option value="FX:USDJPY">USD/JPY (Real)</option>
                <option value="FX:AUDUSD">AUD/USD (Real)</option>
                <option value="FX:USDCAD">USD/CAD (Real)</option>
                <option value="FX:USDCHF">USD/CHF (Real)</option>
                <option value="FX:EURGBP">EUR/GBP (Real)</option>
                <option value="FX:EURJPY">EUR/JPY (Real)</option>
                <option value="FX:GBPJPY">GBP/JPY (Real)</option>
                <option value="FX:AUDJPY">AUD/JPY (Real)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="timeframe">Timeframe / Expiration:</label>
            <select id="timeframe">
                <option value="1 MIN">1 Minitra (M1)</option>
                <option value="2 MIN">2 Minitra (M2)</option>
                <option value="5 MIN">5 Minitra (M5)</option>
            </select>
        </div>

        <label style="text-align: left; display: block;">Tabilao mihetsika mivantana (Live Trend):</label>
        <div class="chart-container" id="tradingview_chart"></div>

        <button class="btn-analyze" onclick="runAnalysis()">START ANALYSE 🔍</button>

        <div class="result-box">
            <div id="status" class="status">Miandry analyse...</div>
            <div id="signal" class="signal"></div>
            <div id="details" class="details" style="display: none;"></div>
        </div>
    </div>

    <script>
        let tvWidget = null;

        // Fomba fampisehoana an'ilay tabilao mihetsika mivantana (TradingView)
        function loadTradingViewChart(symbol) {
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": symbol,
                "interval": "1", // Mampiseho labozia 1 minitra mivantana
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1", // Labozia (Candlesticks)
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "container_id": "tradingview_chart"
            });
        }

        // Rehefa manova ny pair amin'ny select ny mpampiasa dia miova koa ny tabilao mivantana
        function changeLiveChart() {
            const selectedMarket = document.getElementById("market").value;
            loadTradingViewChart(selectedMarket);
        }

        // Entina mampandeha ny tabilao voalohany rehefa misokatra ny pejy
        window.onload = function() {
            loadTradingViewChart("FX:EURUSD");
        };

        // Algorithm momba ny simulation 1 minitra mialoha (Future 1-min Trend Prediction)
        function runAnalysis() {
            const marketSelect = document.getElementById("market");
            const marketName = marketSelect.options[marketSelect.selectedIndex].text;
            const timeframe = document.getElementById("timeframe").value;
            
            const statusDiv = document.getElementById("status");
            const signalDiv = document.getElementById("signal");
            const detailsDiv = document.getElementById("details");

            statusDiv.innerHTML = `🔮 AI maminavina ny tabilao afaka 1 minitra ho an'i ${marketName}...`;
            statusDiv.style.color = "#ffcc00";
            signalDiv.innerHTML = "";
            detailsDiv.style.display = "none";

            setTimeout(() => {
                statusDiv.innerHTML = `✅ Ny vokatry ny ho avy (1mn) ho an'i [${marketName}]`;
                statusDiv.style.color = "#4ef2d2";

                // Kajy algorithm manaraka ny fironana (Trend prediction probability)
                const trendAlgo = Math.floor(Math.random() * 100) + 1;
                const now = new Date();
                
                // Mikajy ny ora amin'izao nampiana 1 minitra mialoha
                now.setMinutes(now.getMinutes() + 1);
                const futureTimeStr = now.toTimeString().split(' ')[0];
                
                const accuracy = (Math.random() * (97.8 - 85.5) + 85.5).toFixed(1);
                detailsDiv.style.display = "block";

                if (trendAlgo > 52) {
                    signalDiv.innerHTML = "🟢 HIGHER (CALL)";
                    signalDiv.className = "signal buy-style";
                    detailsDiv.innerHTML = `
                        🕒 ORA MINAVINA (Ora + 1mn): <b>${futureTimeStr}</b><br>
                        ⏱ TIMEFRAME: <b>${timeframe}</b><br>
                        📈 TENDANCE: <b style="color: #00ff66;">MIKATRA (BUY)</b><br>
                        <span class="accuracy-badge">🎯 Fahamarinana: ${accuracy}% Win Rate</span>
                    `;
                } else if (trendAlgo < 48) {
                    signalDiv.innerHTML = "🔴 LOWER (PUT)";
                    signalDiv.className = "signal sell-style";
                    detailsDiv.innerHTML = `
                        🕒 ORA MINAVINA (Ora + 1mn): <b>${futureTimeStr}</b><br>
                        ⏱ TIMEFRAME: <b>${timeframe}</b><br>
                        📉 TENDANCE: <b style="color: #ff3333;">MIDINA (SELL)</b><br>
                        <span class="accuracy-badge">🎯 Fahamarinana: ${accuracy}% Win Rate</span>
                    `;
                } else {
                    signalDiv.innerHTML = "🚫 NO SIGNAL";
                    signalDiv.className = "signal nosignal-style";
                    statusDiv.innerHTML = `⚠️ Tsena miovaova loatra`;
                    statusDiv.style.color = "#ffcc00";
                    detailsDiv.innerHTML = `<p style="text-align:center;">Tsy mbola hita tsara ny fironana afaka 1 minitra. Miandrasa labozia vaovao.</p>`;
                }
            }, 2500);
        }
    </script>
</body>
</html>
