<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Forex Signal Live Analyzer</title>
    <style>
        /* CSS ho an'ny fomba fijery (Design & Styling) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #161925;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #23283d;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            color: #4ef2d2;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #202436;
            border: 1px solid #2d334d;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select:focus {
            border-color: #4ef2d2;
        }

        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff007f, #7928ca);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        /* Ny zone misy ny valiny (Result Zone) */
        .result-box {
            margin-top: 25px;
            background: #1e2235;
            border-radius: 12px;
            padding: 20px;
            border: 1px dashed #2d334d;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status {
            font-size: 15px;
            color: #a0a0a0;
            font-style: italic;
            margin-bottom: 10px;
        }

        .signal {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .buy-style {
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .sell-style {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .nosignal-style {
            color: #8e9aa8;
        }

        .details {
            margin-top: 10px;
            font-size: 13px;
            color: #4ef2d2;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 FOREX AI ANALYZER</h1>

        <!-- SELECTION MARCHE -->
        <div class="form-group">
            <label for="market">Safidio ny Marche (Pair):</label>
            <select id="market">
                <option value="EUR/USD">EUR/USD</option>
                <option value="GBP/USD">GBP/USD</option>
                <option value="USD/JPY">USD/JPY</option>
                <option value="AUD/USD">AUD/USD</option>
                <option value="EUR/JPY">EUR/JPY</option>
                <option value="GBP/JPY">GBP/JPY</option>
            </select>
        </div>

        <!-- SELECTION TIMEFRAME -->
        <div class="form-group">
            <label for="timeframe">Safidio ny Timeframe (Kandrina):</label>
            <select id="timeframe">
                <option value="1 minitra">1 minitra</option>
                <option value="2 minitra">2 minitra</option>
                <option value="3 minitra">3 minitra</option>
                <option value="5 minitra">5 minitra</option>
            </select>
        </div>

        <!-- BOKOTRA -->
        <button class="btn-analyze" onclick="runAnalysis()">START ANALYSE 🔍</button>

        <!-- ZONE VALINY -->
        <div class="result-box">
            <div id="status" class="status">Miandry analyse...</div>
            <div id="signal" class="signal"></div>
            <div id="details" class="details"></div>
        </div>
    </div>

    <script>
        // JavaScript mifehy ny simulation sy ny fampisehoana signal
        function runAnalysis() {
            const market = document.getElementById("market").value;
            const timeframe = document.getElementById("timeframe").value;
            
            const statusDiv = document.getElementById("status");
            const signalDiv = document.getElementById("signal");
            const detailsDiv = document.getElementById("details");

            // Reset ny interface mandritra ny analyse
            statusDiv.innerHTML = `Manao analyse ny ${market} (${timeframe})...`;
            statusDiv.style.color = "#ffcc00";
            signalDiv.innerHTML = "";
            detailsDiv.innerHTML = "";

            // Simulation kely (1.5 segondra) vao mamoaka signal
            setTimeout(() => {
                statusDiv.innerHTML = `✅ Analyse vita ho an'ny ${market}`;
                statusDiv.style.color = "#4ef2d2";

                // Algorithm kisendrasendra ho an'ny simulation (1=BUY, 2=SELL, 3=NO SIGNAL)
                const ran = Math.floor(Math.random() * 3) + 1;
                
                // Maka ny ora ankehitriny
                const now = new Date();
                const timeStr = now.toTimeString().split(' ')[0];

                if (ran === 1) {
                    signalDiv.innerHTML = "🟢 BUY (CALL)";
                    signalDiv.className = "signal buy-style";
                    detailsDiv.innerHTML = `Ora nivoahany: ${timeStr}<br>⏱ <b>Expiration: Afaka 2 minitra</b>`;
                } else if (ran === 2) {
                    signalDiv.innerHTML = "🔴 SELL (PUT)";
                    signalDiv.className = "signal sell-style";
                    detailsDiv.innerHTML = `Ora nivoahany: ${timeStr}<br>⏱ <b>Expiration: Afaka 2 minitra</b>`;
                } else {
                    signalDiv.innerHTML = "🚫 NO SIGNAL";
                    signalDiv.className = "signal nosignal-style";
                    statusDiv.innerHTML = `⚠️ Tsy milamina ny tsena`;
                    statusDiv.style.color = "#ffcc00";
                    detailsDiv.innerHTML = "Tsy misy tondro mazava tsara. Manandrama indray kely afaka minitra vitsy.";
                }
            }, 1500);
        }
    </script>
</body>
  </html>
